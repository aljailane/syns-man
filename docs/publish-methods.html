<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طرق النشر</title>
  <style>
    body { font-family: Segoe UI, Tahoma, Arial, sans-serif; margin: 0; background: #0f1117; color: #e2e8f0; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px 20px 40px; }
    .card { background: #161b27; border: 1px solid #2a3145; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    code { background: #111827; padding: 2px 6px; border-radius: 6px; color: #93c5fd; }
    a { color: #7fb0ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="./index.html">← العودة إلى فهرس docs</a></p>
    <h1>طرق النشر</h1>

    <div class="card">
      <h3>نشر الكود فقط</h3>
      <p><code>git push</code></p>
    </div>

    <div class="card">
      <h3>نشر Windows</h3>
      <p><code>npm run dist</code></p>
    </div>

    <div class="card">
      <h3>نشر Linux</h3>
      <p><code>npm run dist:linux</code></p>
    </div>

    <div class="card">
      <h3>نشر متعدد</h3>
      <p><code>npm run build:all</code></p>
    </div>

    <div class="card">
      <h3>نشر آلي إلى GitHub Releases</h3>
      <p><code>npm run release:publish</code> + ضبط <code>GH_TOKEN</code></p>
    </div>
  </div>
</body>
</html>
